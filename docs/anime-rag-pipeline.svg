<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1280" viewBox="0 0 1800 1280" role="img" aria-labelledby="title desc">
  <title id="title">Anime RAG Pipeline</title>
  <desc id="desc">Flowchart showing offline ingestion and online query-time retrieval and generation for Anime RAG.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#cbd5e1" />
    </marker>
    <style>
      .bg { fill: #0b1220; }
      .title { fill: #f8fafc; font-family: "Segoe UI", Arial, sans-serif; font-size: 34px; font-weight: 700; }
      .subtitle { fill: #94a3b8; font-family: "Segoe UI", Arial, sans-serif; font-size: 16px; }
      .panel-offline { fill: #111c38; stroke: #3b82f6; stroke-width: 2; rx: 18; }
      .panel-online { fill: #0f2a2a; stroke: #14b8a6; stroke-width: 2; rx: 18; }
      .panel-title { fill: #e2e8f0; font-family: "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 700; }
      .node-offline { fill: #1e3a8a; stroke: #93c5fd; stroke-width: 1.6; rx: 12; }
      .node-online { fill: #0f766e; stroke: #99f6e4; stroke-width: 1.6; rx: 12; }
      .node-decision { fill: #92400e; stroke: #fbbf24; stroke-width: 1.8; }
      .node-text { fill: #f8fafc; font-family: "Segoe UI", Arial, sans-serif; font-size: 14px; font-weight: 600; }
      .node-sub { fill: #e2e8f0; font-family: "Segoe UI", Arial, sans-serif; font-size: 12px; }
      .arrow { stroke: #cbd5e1; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-dashed { stroke: #cbd5e1; stroke-width: 2.2; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 6; }
      .edge-label { fill: #f8fafc; font-family: "Segoe UI", Arial, sans-serif; font-size: 13px; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1280" />

  <text class="title" x="60" y="55">Anime RAG Pipeline</text>
  <text class="subtitle" x="60" y="85">Offline ingestion builds the index; online flow retrieves context and generates responses.</text>

  <rect class="panel-offline" x="40" y="110" width="820" height="1140" />
  <rect class="panel-online" x="940" y="110" width="820" height="1140" />

  <text class="panel-title" x="70" y="155">Offline: Data Ingestion + Index Build</text>
  <text class="node-sub" x="70" y="178">Command: python app/ingestion.py</text>

  <text class="panel-title" x="970" y="155">Online: Query-Time RAG</text>
  <text class="node-sub" x="970" y="178">Command: streamlit run app/streamlit_app.py</text>

  <!-- Offline nodes -->
  <rect class="node-offline" x="120" y="210" width="320" height="58" />
  <text class="node-text" x="280" y="236" text-anchor="middle">data/raw/anime_data23.csv</text>
  <text class="node-sub" x="280" y="252" text-anchor="middle">Raw dataset</text>

  <rect class="node-offline" x="120" y="300" width="320" height="58" />
  <text class="node-text" x="280" y="326" text-anchor="middle">Load + clean CSV</text>
  <text class="node-sub" x="280" y="342" text-anchor="middle">Drop fields, normalize unknowns</text>

  <rect class="node-offline" x="120" y="390" width="320" height="58" />
  <text class="node-text" x="280" y="416" text-anchor="middle">Build chunked documents</text>
  <text class="node-sub" x="280" y="432" text-anchor="middle">content + metadata per chunk</text>

  <rect class="node-offline" x="120" y="480" width="320" height="58" />
  <text class="node-text" x="280" y="506" text-anchor="middle">Save documents.json</text>
  <text class="node-sub" x="280" y="522" text-anchor="middle">data/processed/documents.json</text>

  <rect class="node-offline" x="120" y="570" width="320" height="58" />
  <text class="node-text" x="280" y="596" text-anchor="middle">Build embeddings (BGE)</text>
  <text class="node-sub" x="280" y="612" text-anchor="middle">normalize_embeddings=True</text>

  <rect class="node-offline" x="120" y="660" width="320" height="58" />
  <text class="node-text" x="280" y="686" text-anchor="middle">Build FAISS IndexFlatIP</text>
  <text class="node-sub" x="280" y="702" text-anchor="middle">Vector index for similarity search</text>

  <rect class="node-offline" x="120" y="750" width="320" height="58" />
  <text class="node-text" x="280" y="776" text-anchor="middle">Save anime.index</text>
  <text class="node-sub" x="280" y="792" text-anchor="middle">embeddings/faiss_index/anime.index</text>

  <rect class="node-offline" x="500" y="570" width="300" height="58" />
  <text class="node-text" x="650" y="596" text-anchor="middle">Save embeddings.npy</text>
  <text class="node-sub" x="650" y="612" text-anchor="middle">embeddings/faiss_index/embeddings.npy</text>

  <!-- Offline arrows -->
  <line class="arrow" x1="280" y1="268" x2="280" y2="300" />
  <line class="arrow" x1="280" y1="358" x2="280" y2="390" />
  <line class="arrow" x1="280" y1="448" x2="280" y2="480" />
  <line class="arrow" x1="280" y1="448" x2="280" y2="570" />
  <line class="arrow" x1="280" y1="628" x2="280" y2="660" />
  <line class="arrow" x1="280" y1="718" x2="280" y2="750" />
  <line class="arrow" x1="440" y1="599" x2="500" y2="599" />

  <!-- Online nodes -->
  <rect class="node-online" x="1020" y="210" width="360" height="58" />
  <text class="node-text" x="1200" y="236" text-anchor="middle">User prompt (Streamlit)</text>
  <text class="node-sub" x="1200" y="252" text-anchor="middle">chat_input in app/streamlit_app.py</text>

  <rect class="node-online" x="1020" y="300" width="360" height="58" />
  <text class="node-text" x="1200" y="326" text-anchor="middle">routing.run_rag(...)</text>
  <text class="node-sub" x="1200" y="342" text-anchor="middle">Entry point for retrieval + generation</text>

  <rect class="node-online" x="1020" y="390" width="360" height="58" />
  <text class="node-text" x="1200" y="416" text-anchor="middle">retrieval.search(...)</text>
  <text class="node-sub" x="1200" y="432" text-anchor="middle">Load docs/index, apply optional filters</text>

  <rect class="node-online" x="1020" y="480" width="360" height="58" />
  <text class="node-text" x="1200" y="506" text-anchor="middle">Embed query (same BGE model)</text>
  <text class="node-sub" x="1200" y="522" text-anchor="middle">Instruction-prefixed query embedding</text>

  <rect class="node-online" x="1020" y="570" width="360" height="58" />
  <text class="node-text" x="1200" y="596" text-anchor="middle">FAISS vector search</text>
  <text class="node-sub" x="1200" y="612" text-anchor="middle">candidate_k = max(k, k * 4)</text>

  <rect class="node-online" x="1020" y="660" width="360" height="58" />
  <text class="node-text" x="1200" y="686" text-anchor="middle">Metadata filters + BM25 tie-break</text>
  <text class="node-sub" x="1200" y="702" text-anchor="middle">Combined score and reranking</text>

  <rect class="node-online" x="1020" y="750" width="360" height="58" />
  <text class="node-text" x="1200" y="776" text-anchor="middle">Dedupe by title and keep top k</text>
  <text class="node-sub" x="1200" y="792" text-anchor="middle">Best chunk per anime title</text>

  <polygon class="node-decision" points="1200,840 1270,910 1200,980 1130,910" />
  <text class="node-text" x="1200" y="905" text-anchor="middle">top score >= 0.25?</text>
  <text class="node-sub" x="1200" y="923" text-anchor="middle">confidence gate</text>

  <rect class="node-online" x="960" y="1020" width="360" height="58" />
  <text class="node-text" x="1140" y="1046" text-anchor="middle">No confident match response</text>
  <text class="node-sub" x="1140" y="1062" text-anchor="middle">Ask user to rephrase / add constraints</text>

  <rect class="node-online" x="1380" y="1020" width="360" height="58" />
  <text class="node-text" x="1560" y="1046" text-anchor="middle">generation.build_messages(...)</text>
  <text class="node-sub" x="1560" y="1062" text-anchor="middle">Format context and chat history</text>

  <rect class="node-online" x="1380" y="1105" width="360" height="58" />
  <text class="node-text" x="1560" y="1131" text-anchor="middle">ollama.chat(model=...)</text>
  <text class="node-sub" x="1560" y="1147" text-anchor="middle">LLM completion</text>

  <rect class="node-online" x="1380" y="1190" width="360" height="58" />
  <text class="node-text" x="1560" y="1216" text-anchor="middle">Assistant answer + top matches/images</text>
  <text class="node-sub" x="1560" y="1232" text-anchor="middle">Rendered back in Streamlit UI</text>

  <!-- Online arrows -->
  <line class="arrow" x1="1200" y1="268" x2="1200" y2="300" />
  <line class="arrow" x1="1200" y1="358" x2="1200" y2="390" />
  <line class="arrow" x1="1200" y1="448" x2="1200" y2="480" />
  <line class="arrow" x1="1200" y1="538" x2="1200" y2="570" />
  <line class="arrow" x1="1200" y1="628" x2="1200" y2="660" />
  <line class="arrow" x1="1200" y1="718" x2="1200" y2="750" />
  <line class="arrow" x1="1200" y1="808" x2="1200" y2="840" />

  <path class="arrow" d="M1130,910 C1060,910 1020,950 1020,1020" />
  <path class="arrow" d="M1270,910 C1340,910 1380,950 1380,1020" />
  <line class="arrow" x1="1560" y1="1078" x2="1560" y2="1105" />
  <line class="arrow" x1="1560" y1="1163" x2="1560" y2="1190" />

  <!-- Cross-phase dependencies -->
  <path class="arrow-dashed" d="M440,509 C700,430 830,430 1020,420" />
  <path class="arrow-dashed" d="M440,779 C700,640 830,590 1020,600" />

  <text class="edge-label" x="1090" y="985">No</text>
  <text class="edge-label" x="1310" y="985">Yes</text>

  <text class="node-sub" x="710" y="415">documents.json feeds retrieval</text>
  <text class="node-sub" x="710" y="570">anime.index feeds FAISS search</text>
</svg>
