services:
  - type: web
    name: anime-rag-web
    runtime: python
    plan: free
    buildCommand: bash scripts/render-build.sh
    startCommand: bash scripts/render-start.sh
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: LLM_PROVIDER
        value: nvidia
      - key: NVIDIA_MODEL
        value: moonshotai/kimi-k2-instruct
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: HF_HOME
        value: /opt/render/project/src/.cache/huggingface
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /opt/render/project/src/.cache/sentence-transformers
      - key: NVIDIA_API_KEY
        sync: false
